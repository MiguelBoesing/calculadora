<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1b1b1b;
    }

    .calc {
      width: 340px;
      background: #202020;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    .top {
      color: #ccc;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .display {
      height: 70px;
      color: white;
      font-size: 40px;
      text-align: right;
      padding: 10px;
      margin-bottom: 10px;
      overflow-x: auto;
    }

    .memory {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .memory button {
      background: none;
      border: none;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      height: 60px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      background: #2d2d2d;
      color: white;
      transition: 0.2s;
    }

    button:hover { background: #3a3a3a; }

    .operator { background: #333; }
    .operator:hover { background: #444; }

    .equal {
      background: #9e9e9e;
      color: black;
    }

    .equal:hover { background: #bdbdbd; }

  </style>
</head>
<body>

<div class="calc">
  <div class="top">Padrão</div>
  <div id="display" class="display">0</div>

  <div class="memory">
    <button>MC</button>
    <button>MR</button>
    <button>M+</button>
    <button>M-</button>
    <button>MS</button>
  </div>

  <div class="grid">
    <button onclick="append('%')">%</button>
    <button onclick="clearDisplay()">CE</button>
    <button onclick="clearDisplay()">C</button>
    <button onclick="backspace()">⌫</button>

    <button onclick="append('1/')">1/x</button>
    <button onclick="square()">x²</button>
    <button onclick="sqrt()">√</button>
    <button class="operator" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="operator" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="operator" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="operator" onclick="append('+')">+</button>

    <button onclick="toggleSign()">+/-</button>
    <button onclick="append('0')">0</button>
    <button onclick="append('.')">,</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let display = document.getElementById('display');

  function append(val) {
    if (display.innerText === '0') display.innerText = val;
    else display.innerText += val;
  }

  function clearDisplay() { display.innerText = '0'; }

  function backspace() {
    display.innerText = display.innerText.slice(0, -1) || '0';
  }

  function calculate() {
    try { display.innerText = eval(display.innerText); }
    catch { display.innerText = 'Erro'; }
  }

  function square() {
    display.innerText = eval(display.innerText) ** 2;
  }

  function sqrt() {
    display.innerText = Math.sqrt(eval(display.innerText));
  }

  function toggleSign() {
    display.innerText = eval(display.innerText) * -1;
  }
</script>

</body>
</html>
